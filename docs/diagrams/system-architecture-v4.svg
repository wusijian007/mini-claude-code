<g class="c-gray"><rect x="600" y="44" width="196" height="52" rx="6"/><text class="th" x="698" y="68" text-anchor="middle">Anthropic API</text><text class="ts" x="698" y="86" text-anchor="middle">3-breakpoint cache</text></g>

<rect x="24" y="116" width="772" height="326" rx="8" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="ts" x="38" y="136">packages/core — agent runtime</text>

<g class="c-gray"><rect x="40" y="150" width="232" height="74" rx="6"/><text class="th" x="156" y="182" text-anchor="middle">Tool scheduler</text><text class="ts" x="156" y="200" text-anchor="middle">partition · permission · hooks</text></g>
