<g class="c-purple"><rect x="296" y="248" width="232" height="74" rx="6"/><text class="th" x="412" y="280" text-anchor="middle">Done-gate chain</text><text class="ts" x="412" y="298" text-anchor="middle">verify → critic</text></g>
