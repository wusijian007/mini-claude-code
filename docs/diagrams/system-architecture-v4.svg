<svg viewBox="0 0 820 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="arcT arcD">
<title id="arcT">Mini Claude Code — system architecture (v4)</title>
<desc id="arcD">The myagent CLI drives the core query loop, which orchestrates the model client, tool scheduler, and services; the tools package and on-disk state sit below. Purple boxes are the v3/v4 kernel-excellence subsystems: cache aligning, the five-layer context pipeline, the done-gate chain, and the background state machine.</desc>
<style>
  text { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
  .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
  .c-gray rect, rect.c-gray { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray .th { fill: #2C2C2A; } .c-gray .ts { fill: #5F5E5A; }
  .c-purple rect, rect.c-purple { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple .th { fill: #3C3489; } .c-purple .ts { fill: #534AB7; }
  @media (prefers-color-scheme: dark) { .th { fill: #D3D1C7; } .ts { fill: #B4B2A9; } }
</style>
